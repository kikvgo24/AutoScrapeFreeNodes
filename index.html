<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoScrape - Next Gen Node Scraper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/subscription.css">
</head>
<body>

<!-- 加载动画 -->
<div id="loader" class="loading-overlay" style="display:none;">
    <div class="trae-loader"></div>
</div>

<!-- 导航栏 -->
<nav class="trae-nav">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="navbar-brand" onclick="switchPage('home')">
            AUTO<span class="logo-scrape">SCRAPE</span>
        </div>
        <div class="d-flex gap-4">
            <span id="nav-dashboard" class="nav-link-custom" onclick="switchPage('dashboard')">
                <i class="bi bi-speedometer2 me-2"></i>工作台
            </span>
            <span class="nav-link-custom" onclick="openOverlay('overlay-about')">
                <i class="bi bi-info-circle me-2"></i>关于项目
            </span>
            <a href="https://github.com/kikvgo24/AutoScrapeFreeNodes" target="_blank" class="nav-link-custom text-decoration-none">
                <i class="bi bi-github me-2"></i>GitHub
            </a>
        </div>
    </div>
</nav>

<!-- 首页 -->
<div id="page-home" class="page-section page-active">
    <div class="container hero-section text-center">
        <div class="hero-tag">DISTRIBUTED SCRAPING SYSTEM</div>
        <h1 class="hero-title">
            <span>采集免费节点</span>
            <span class="logo-scrape">从未如此简单</span>
        </h1>
        <p class="text-secondary fs-5 mb-5 mx-auto" style="max-width: 650px;">
            基于现代化技术栈构建的自动化数据流转系统。<br>
            结合 GitHub Actions 高效同步，为社区提供实时、可靠的订阅分发服务。
        </p>
        <button class="btn px-5 py-3"
                style="background:var(--trae-green); color:#000; font-weight:800;"
                onclick="switchPage('dashboard')">
            进入控制台 <i class="bi bi-arrow-right ms-2"></i>
        </button>
    </div>
</div>

<!-- 控制台 -->
<div id="page-dashboard" class="page-section">
    <div class="container mt-5">
        <!-- 统计信息 -->
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-val" id="total-nodes">0</div>
                <div class="text-secondary small">总计节点</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="total-sources">0</div>
                <div class="text-secondary small">活跃源站</div>
            </div>
            <div class="stat-box">
                <div class="stat-val">6h</div>
                <div class="text-secondary small">同步频率</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="last-update-time">--</div>
                <div class="text-secondary small">最近更新时间</div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary small">协议筛选:</span>
                <select id="type-filter" class="trae-select">
                    <option value="all">所有协议</option>
                    <option value="Clash">Clash</option>
                    <option value="V2ray">V2ray</option>
                    <option value="Sing-Box">Sing-Box</option>
                    <option value="Shadowrocket">Shadowrocket</option>
                    <option value="Quantumult">Quantumult</option>
                    <option value="SS/SSR">SS/SSR</option>
                    <option value="Trojan">Trojan</option>
                    <option value="通用">通用</option>
                    <option value="自定义">自定义</option>
                </select>
            </div>

            <!-- 触发更新按钮 -->
            <button id="refresh-btn" class="btn"
                    style="background:var(--trae-green); color:#000; font-weight:700;">
                <i class="bi bi-arrow-repeat me-1"></i> 刷新数据
            </button>
        </div>

        <!-- 订阅列表 -->
        <div id="subscriptions-container" class="row g-4 mt-3"></div>
    </div>
</div>

<!-- 页脚 -->
<footer class="text-center py-4 mt-5">
    <div class="text-secondary smaller" style="letter-spacing: 2px;">
        © 2026 AUTOSCRAPE. AN OPEN SOURCE PROJECT.
    </div>
</footer>

<!-- 原有脚本 -->
<script src="js/config.js"></script>
<script src="js/inline-data.js"></script>
<script src="js/subscription-manager.js"></script>
<script src="js/app.js"></script>

<!-- ========================= -->
<!-- 新增：页面控制与更新功能 -->
<!-- ========================= -->
<script>
    // 页面切换
    function switchPage(p) {
        document.querySelectorAll('.page-section')
            .forEach(s => s.classList.remove('page-active'));
        document.getElementById('page-' + p)
            .classList.add('page-active');

        document.querySelectorAll('.nav-link-custom')
            .forEach(l => l.classList.remove('active'));
        if (p === 'dashboard') {
            document.getElementById('nav-dashboard')
                .classList.add('active');
        }
        window.scrollTo(0, 0);
    }

    // 显示最近更新时间
    function updateLastUpdateTime() {
        const el = document.getElementById('last-update-time');
        if (el) {
            el.textContent = new Date().toLocaleString('zh-CN');
        }
    }
    updateLastUpdateTime();

    // =========================
    // 触发 GitHub Actions 更新
    // =========================
    document.getElementById('refresh-btn')
        ?.addEventListener('click', async function () {

        const loader = document.getElementById('loader');
        const button = this;

        const confirmUpdate = confirm(
            "确定要手动触发节点数据更新吗？\n" +
            "该操作将重新抓取并部署最新数据，预计需要1-2分钟。"
        );
        if (!confirmUpdate) return;

        try {
            loader.style.display = 'flex';
            button.disabled = true;
            button.innerHTML =
                '<i class="bi bi-arrow-repeat me-1"></i> 更新中...';

            const response = await fetch(
                'https://djb.20250420ulife.store/trigger-update',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                }
            );

            const result = await response.json();

            if (response.ok) {
                alert(
                    "✅ 更新任务已成功触发！\n" +
                    "请等待约1-2分钟后刷新页面查看最新数据。"
                );
                updateLastUpdateTime();
            } else {
                alert("❌ 触发失败：" + (result.error || "未知错误"));
            }
        } catch (error) {
            alert("❌ 请求失败：" + error.message);
        } finally {
            loader.style.display = 'none';
            button.disabled = false;
            button.innerHTML =
                '<i class="bi bi-arrow-repeat me-1"></i> 刷新数据';
        }
    });
</script>

</body>
</html>
