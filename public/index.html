<script>
    function switchPage(p) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('page-active'));
        document.getElementById('page-' + p).classList.add('page-active');
        
        // 处理导航栏高亮
        document.querySelectorAll('.nav-link-custom').forEach(l => l.classList.remove('active'));
        if(p === 'dashboard') {
            document.getElementById('nav-dashboard').classList.add('active');
        }
        
        window.scrollTo(0,0);
    }
    
    function openOverlay(id) {
        document.getElementById(id).style.display = 'block';
        if (id === 'overlay-status') {
            initApiStatus();
        }
        document.body.style.overflow = 'hidden';
    }
    
    function closeOverlay() {
        document.querySelectorAll('.overlay-full').forEach(o => o.style.display = 'none');
        document.body.style.overflow = 'auto';
    }

    // ===============================
    // 触发 GitHub Actions 更新逻辑
    // ===============================
    document.getElementById('refresh-btn')?.addEventListener('click', async function () {
        const loader = document.getElementById('loader');
        const button = this;

        // 确认提示
        const confirmUpdate = confirm("确定要手动触发节点数据更新吗？\n该操作将重新抓取并部署最新数据，可能需要1-2分钟。");
        if (!confirmUpdate) return;

        try {
            loader.style.display = 'flex';
            button.disabled = true;
            button.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i> 更新中...';

            const response = await fetch('https://djb.20250420ulife.store/trigger-update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                alert("✅ 更新任务已成功触发！\n请等待约1-2分钟后刷新页面查看最新数据。");
            } else {
                const errorText = await response.text();
                alert("❌ 触发失败，请稍后重试。\n错误信息：" + errorText);
            }
        } catch (error) {
            alert("❌ 请求失败，请检查网络连接。\n" + error.message);
        } finally {
            loader.style.display = 'none';
            button.disabled = false;
            button.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i> 刷新数据';
        }
    });
</script>
