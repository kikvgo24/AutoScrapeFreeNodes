<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoScrape - 节点订阅聚合平台</title>

    <!-- Bootstrap & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
        }
        .subscription-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            height: 100%;
        }
        .subscription-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .subscription-url {
            font-size: 0.85rem;
            word-break: break-all;
            background: #020617;
            padding: 10px;
            border-radius: 6px;
        }
        .stat-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-val {
            font-size: 28px;
            font-weight: bold;
            color: #22c55e;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #22c55e;
            border-top: 6px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- 加载动画 -->
<div id="loader" class="loading-overlay">
    <div class="loader-spinner"></div>
</div>

<!-- 导航栏 -->
<nav class="navbar navbar-dark bg-dark py-3">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold">AutoScrape</span>
        <a href="https://github.com/kikvgo24/AutoScrapeFreeNodes" target="_blank" class="text-white text-decoration-none">
            <i class="bi bi-github"></i> GitHub
        </a>
    </div>
</nav>

<!-- 标题 -->
<div class="container text-center my-5">
    <h1 class="fw-bold mb-3">免费节点订阅聚合平台</h1>
    <p class="text-secondary">
        自动抓取并整理公开网络中的 Clash、V2ray、Sing-Box 等订阅链接。
    </p>
</div>

<!-- 统计信息 -->
<div class="container mb-4">
    <div class="row g-3">
        <div class="col-md-4">
            <div class="stat-box">
                <div class="stat-val" id="total-nodes">0</div>
                <div class="text-secondary small">总计订阅</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box">
                <div class="stat-val" id="total-sources">1</div>
                <div class="text-secondary small">来源站点</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box">
                <div class="stat-val" id="last-update-time">--</div>
                <div class="text-secondary small">最近更新时间</div>
            </div>
        </div>
    </div>
</div>

<!-- 控制面板 -->
<div class="container mb-4 d-flex justify-content-between flex-wrap gap-3">
    <button id="refresh-btn" class="btn btn-success">
        <i class="bi bi-arrow-repeat"></i> 触发更新
    </button>
</div>

<!-- 订阅列表 -->
<div class="container">
    <div id="subscriptions-container" class="row g-4"></div>
</div>

<!-- 页脚 -->
<footer class="text-center text-secondary py-4 mt-5">
    © 2026 AutoScrape - Open Source Project
</footer>

<script>
const subscriptions = [
    { type: "Clash", url: "https://node.freeclashnode.com/uploads/2026/04/0-20260412.yaml" },
    { type: "Clash", url: "https://node.freeclashnode.com/uploads/2026/04/1-20260412.yaml" },
    { type: "Clash", url: "https://node.freeclashnode.com/uploads/2026/04/2-20260412.yaml" },
    { type: "Clash", url: "https://node.freeclashnode.com/uploads/2026/04/3-20260412.yaml" },
    { type: "Clash", url: "https://node.freeclashnode.com/uploads/2026/04/4-20260412.yaml" },
    { type: "V2ray", url: "https://node.freeclashnode.com/uploads/2026/04/0-20260412.txt" },
    { type: "V2ray", url: "https://node.freeclashnode.com/uploads/2026/04/1-20260412.txt" },
    { type: "V2ray", url: "https://node.freeclashnode.com/uploads/2026/04/2-20260412.txt" },
    { type: "V2ray", url: "https://node.freeclashnode.com/uploads/2026/04/3-20260412.txt" },
    { type: "Sing-Box", url: "https://node.freeclashnode.com/uploads/2026/04/20260412.json" }
];

document.getElementById("total-nodes").textContent = subscriptions.length;
document.getElementById("last-update-time").textContent =
    new Date().toLocaleString("zh-CN");

const container = document.getElementById("subscriptions-container");

subscriptions.forEach(sub => {
    container.innerHTML += `
        <div class="col-md-6 col-lg-4">
            <div class="subscription-card">
                <span class="badge bg-success mb-2">${sub.type}</span>
                <div class="subscription-url mb-3">${sub.url}</div>
                <button class="btn btn-sm btn-outline-light"
                    onclick="navigator.clipboard.writeText('${sub.url}')">
                    复制
                </button>
                <a href="${sub.url}" target="_blank"
                   class="btn btn-sm btn-outline-success ms-2">
                   打开
                </a>
            </div>
        </div>`;
});

// 触发更新
document.getElementById("refresh-btn").addEventListener("click", async () => {
    if (!confirm("确定要触发更新吗？")) return;

    document.getElementById("loader").style.display = "flex";

    try {
        const res = await fetch(
            "https://djb.20250420ulife.store/trigger-update",
            { method: "POST" }
        );

        if (res.ok) {
            alert("✅ 更新任务已触发！");
        } else {
            alert("❌ 触发失败");
        }
    } catch (e) {
        alert("❌ 请求失败：" + e.message);
    } finally {
        document.getElementById("loader").style.display = "none";
    }
});
</script>

</body>
</html>
